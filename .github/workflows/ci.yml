name: CI

on:
  push:
  pull_request:

jobs:
  Build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            env:
              CC: clang
              CXX: clang++
              npm_config_clang: 1
          - os: windows-latest
            env: {}
          - os: macos-latest
            env:
              CC: clang
              CXX: clang++
              npm_config_clang: 1
    env: ${{ matrix.env }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        name: Install Node
        with:
          node-version: 20
      - name: Install module
        run: |
          npm run prepare
          npm install
      - name: Run tests
        run: npm test
